# Catppuccin Macchiato
thm_rosewater=#f4dbd6
thm_flamingo=#f0c6c6
thm_pink=#f5bde6
thm_mauve=#c6a0f6
thm_red=#ed8796
thm_maroon=#ee99a0
thm_peach=#f5a97f
thm_yellow=#eed49f
thm_green=#a6da95
thm_teal=#89dceb
thm_sky=#8bd5ca
thm_sapphire=#7dc4e4
thm_blue=#8aadf4
thm_lavender=#b7bdf8
thm_text=#cad3f5
thm_subtext1=#b8c0e0
thm_subtext0=#a5abcd
thm_overlay2=#939ab7
thm_overlay1=#8087a2
thm_overlay0=#6e738d
thm_surface2=#5b6078
thm_surface1=#494d64
thm_surface0=#363a4f
thm_base=#24273a
thm_mantle=#1e2030
thm_crust=#181926

# Status bar
set -g status off
# set -g status-position top
set -g status-bg "${thm_base}"
set -g status-justify "left"
set -g status-left-length "100"
set -g status-right-length "100"

# Messages
set -g message-style "fg=${thm_green},bg=${thm_base},align=centre"
set -g message-command-style "fg=${thm_sky},bg=${thm_surface1},align=centre"

# Panes
set -g pane-border-style "fg=${thm_surface1}"
set -g pane-active-border-style "fg=${thm_blue}"

# Windows
set -g window-status-separator ""
set -g window-status-style "fg=${thm_text},bg=${thm_base},none"
set -g window-status-activity-style "fg=${thm_text},bg=${thm_base},none"

# Statusline
set -g window-status-separator "#[bg=#{@thm_base},fg=#{@thm_surface_1}]│"
set -g window-status-format "#[bg=${thm_base}] #{?window_zoomed_flag,#[fg=${thm_red}]#I,#[fg=${thm_overlay1}]#I} #[fg=#{?window_last_flag,${thm_mauve},${thm_subtext0}},bg=${thm_base}]#W "
set -g window-status-current-format "#[bg=${thm_base}] #{?window_zoomed_flag,#[fg=${thm_green}]Z,#[fg=${thm_blue}]#I} #[fg=${thm_rosewater},bg=${thm_base}]#(echo '#{pane_current_path}' | rev | cut -d'/' -f-2 | rev) #[fg=${thm_mauve},bg=${thm_base}]"
set -g status-left ""

set -g status-right ""
set -ga status-right "#(~/.config/tmux/scripts/git-remote '#{pane_current_path}')"
set -ga status-right "#(gitmux -cfg ~/.gitmux.conf '#{pane_current_path}') "
set -ga status-right "#[fg=${thm_blue},bg=${thm_base},nobold,nounderscore,noitalics]#[fg=${thm_base},bg=${thm_blue},nobold,nounderscore,noitalics]  #[fg=${thm_text},bg=${thm_surface0}] #W "
set -ga status-right "#{?client_prefix,#[fg=${thm_mauve}],#[fg=${thm_sky}]}#[bg=${thm_surface1}]#{?client_prefix,#[bg=${thm_red}],#[bg=${thm_green}]}#[fg=${thm_base}]  #[fg=${thm_text},bg=${thm_surface0}] #S "

# Modes
set -g clock-mode-colour "${thm_yellow}"
set -g mode-style "fg=${thm_text} bg=${thm_surface0} bold"