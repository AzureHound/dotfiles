[pyprland]
plugins = ["scratchpads"]

[pyprland.variables]
shell = "zsh -c"
term = "kitty --class"

[scratchpads.term]
animation = ""
command = "[term] Term"
class = "Term"
size = "80% 80%"
unfocus = "hide"
hysteresis = 0.6
lazy = true

