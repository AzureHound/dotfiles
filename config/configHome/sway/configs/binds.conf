include $config_dir/apps.conf

# в–Ҳ в–ҲвҖғв–„в–Җв–ҲвҖғв–Ҳв–Җв–ҲвҖғв–ҲвҖғв–„в–Җв–ҲвҖғв–Ҳв–„в–„вҖғв–Ҳ  вҖғв–Ҳв–Җв–ҖвҖғв–Ҳв–Җ
# в–Җв–„в–ҖвҖғв–Ҳв–Җв–ҲвҖғв–Ҳв–Җв–„вҖғв–ҲвҖғв–Ҳв–Җв–ҲвҖғв–Ҳв–„в–ҲвҖғв–Ҳв–„в–„вҖғв–Ҳв–Ҳв–„вҖғв–„в–Ҳ

set $meta  Mod4
set $hyper Mod3

set $left  h
set $down  j
set $up    k
set $right l

set $screen           eDP-1

set $bin              ~/.local/bin
set $scripts          ~/.config/sway/scripts
set $scratchpad       ~/.config/sway/scripts/scratchpad
set $launcher-scripts ~/.config/rofi/scripts

# в–Ҳв–„в–ҖвҖғв–Ҳв–Җв–ҖвҖғв–Ҳв–„в–ҲвҖғв–Ҳв–„в–„вҖғв–ҲвҖғв–Ҳв–„ в–ҲвҖғв–Ҳв–Җв–„вҖғв–ҲвҖғв–Ҳв–„ в–ҲвҖғв–Ҳв–Җв–ҖвҖғв–Ҳв–Җ
# в–Ҳ в–ҲвҖғв–Ҳв–Ҳв–„вҖғ в–Ҳ вҖғв–Ҳв–„в–ҲвҖғв–ҲвҖғв–Ҳ в–Җв–ҲвҖғв–Ҳв–„в–ҖвҖғв–ҲвҖғв–Ҳ в–Җв–ҲвҖғв–Ҳв–„в–ҲвҖғв–„в–Ҳ

bindsym {
  $meta+Q kill
  $meta+$hyper+R reload
  # $meta+SHIFT+E exec swaynag -t warning -m 'Exit Sway?' -b 'Yes' 'swaymsg exit'
}

## Pickers/Launchers
bindsym {
  ALT+SPACE               exec $launcher
  CTRL+ALT+M workspace 9; exec $bin/hidpi
  $hyper+BACKSLASH        exec kitten quick-access-terminal
  # $meta+I workspace 1;    exec $term -a tmux ~/.local/bin/session-init
  $meta+I workspace 1;    exec $term-ALT --app-id tmux ~/.local/bin/session-init

  CTRL+$hyper+Y   exec $launcher-scripts/clipboard/clipboard
  # CTRL+$hyper+E   exec $launcher-scripts/emoji/emoji
  CTRL+$hyper+K   exec $launcher-scripts/keybindings/keybindings
  $meta+ESCAPE    exec $launcher-scripts/powermenu/powermenu
  CTRL+ESCAPE     exec $launcher-scripts/screenshot/screenshot
  $meta+SHIFT+S   exec $launcher-scripts/screenshot/screenshot #--freeze # PrtSrc
  $meta+ALT+SPACE exec $launcher-scripts/windows/windows
  $meta+ALT+0     exec $scripts/caffeine
  CTRL+$hyper+S   exec $scripts/ocr
  CTRL+$hyper+C   exec $scripts/pigment
  CTRL+$hyper+R   exec $scripts/screenrcd
  # CTRL+$hyper+SHIFT+R   exec $scripts/screenrcd -a
}

## Apps
bindsym {
  $meta+RETURN               exec $term
  $meta+SHIFT+RETURN         exec $term-ALT
  # $meta+B                    exec $browser
  $meta+B workspace 2;       exec $browser-ALT
  CTRL+$hyper+P workspace 3; exec $browser-ALT --private-window
  $meta+E                    exec $term -e $file-manager
  $meta+SHIFT+E              exec $file-manager-gui

  XF86Calculator             exec gnome-calculator
}

## Notification Panel
bindsym {
  $meta+CTRL+N  exec $notifications-menu-read
  $meta+ALT+N   exec $notifications-menu-dnd
  $meta+SHIFT+N exec $notifications-menu-reload
}

## Wallpaper
bindsym {
  $meta+SHIFT+W exec $scripts/wallpaper
  $meta+W       exec $launcher-scripts/wallpaper/wallpaper
}

## App Launcher
bindsym $hyper+A mode "app"

mode "app" {
  bindsym {
    F exec $browser-ALT,      mode "default"
    N exec $file-manager-gui, mode "default"
    O exec $notes,            mode "default"
    Q exec $browser,          mode "default"
    T exec $mail,             mode "default"
    Z exec $editor-gui,       mode "default"

    $hyper+A mode "default"
    ESCAPE   mode "default"
    RETURN   mode "default"
  }
}

# Web Apps
bindsym $meta+X mode "links"

mode "links" {
  bindsym {
    C exec $webapp https://chatgpt.com/?temporary-chat=true, mode "default"
    G exec $webapp https://gemini.google.com/app,            mode "default"
    P exec $webapp https://perplexity.ai,                    mode "default"
    Q exec $webapp https://chat.qwen.ai,                     mode "default"
    X exec $webapp https://grok.com/,                        mode "default"
    Y exec $webapp https://youtube.com,                      mode "default"

    SHIFT+G exec $webapp https://github.com/azurehound,      mode "default"

    ESCAPE mode "default"
    RETURN mode "default"
  }
}

## Scratchpads
bindsym {
  $meta+BACKSLASH exec $scratchpad quickterm        $term-ALT
  $hyper+B        exec $scratchpad activity         $term-ALT -e btop
  $hyper+N        exec $scratchpad code-editor      $term-ALT -e nvim
  $hyper+I        exec $scratchpad gpt              $term-ALT -e tgpt
  $hyper+G        exec $scratchpad gpu              $term-ALT -e nvtop
  $hyper+Y        exec $scratchpad file-manager     $term-ALT -e yazi
  $hyper+M        exec $scratchpad mail             $term-ALT -e neomutt
  $hyper+0        exec $scratchpad rhythm           $term-ALT -e cava
  $hyper+S        exec $scratchpad sounds           $term-ALT -e ~/.local/bin/sounds
  $hyper+V        exec $scratchpad text-editor      $term-ALT -e vim
  $hyper+T        exec $scratchpad to-do            $term-ALT -e nvim ~/Obsidian/To-do.md
  CTRL+$hyper+B   exec $scratchpad bluetooth        $term-ALT -e bluetui
  CTRL+$hyper+E   exec $scratchpad emoji            $term-tmp ~/.local/bin/emoji
  CTRL+$hyper+G   exec $scratchpad glyph            $term-tmp ~/.local/bin/glyph
  CTRL+$hyper+W   exec $scratchpad wifi             $term-ALT -e impala
}

## Focusing
bindsym {
  $meta+Left  focus left
  $meta+Down  focus down
  $meta+Up    focus up
  $meta+RIGHT focus right

  $meta+$left  focus left
  $meta+$down  focus down
  $meta+$up    focus up
  $meta+$right focus right
}

## Moving
bindsym {
  $meta+SHIFT+Left  move left
  $meta+SHIFT+Down  move down
  $meta+SHIFT+Up    move up
  $meta+SHIFT+RIGHT move right

  $meta+SHIFT+$left  move left
  $meta+SHIFT+$down  move down
  $meta+SHIFT+$up    move up
  $meta+SHIFT+$right move right
}

## Workspaces
bindsym {
  $meta+CTRL+LEFT  workspace prev
  $meta+CTRL+RIGHT workspace next

  $meta+CTRL+H     workspace prev
  $meta+CTRL+L     workspace next
}

bindsym {
  $meta+1 workspace number 1
  $meta+2 workspace number 2
  $meta+3 workspace number 3
  $meta+4 workspace number 4
  $meta+5 workspace number 5
  $meta+6 workspace number 6
  $meta+7 workspace number 7
  $meta+8 workspace number 8
  $meta+9 workspace number 9
  $meta+0 workspace number 10

  $meta+KP_End     workspace number 11
  $meta+KP_Down    workspace number 12
  $meta+KP_Next    workspace number 13
  $meta+KP_Left    workspace number 14
  $meta+KP_Begin   workspace number 15
  $meta+KP_Right   workspace number 16
  $meta+KP_Home    workspace number 17
  $meta+KP_Up      workspace number 18
  $meta+KP_Page_Up workspace number 19
  $meta+KP_Insert  workspace number 20
}

## Moving Windows to Workspaces
bindsym {
  $meta+SHIFT+1 move container to workspace number 1
  $meta+SHIFT+2 move container to workspace number 2
  $meta+SHIFT+3 move container to workspace number 3
  $meta+SHIFT+4 move container to workspace number 4
  $meta+SHIFT+5 move container to workspace number 5
  $meta+SHIFT+6 move container to workspace number 6
  $meta+SHIFT+7 move container to workspace number 7
  $meta+SHIFT+8 move container to workspace number 8
  $meta+SHIFT+9 move container to workspace number 9
  $meta+SHIFT+0 move container to workspace number 10

  $meta+SHIFT+KP_End     move container to workspace number 11
  $meta+SHIFT+KP_Down    move container to workspace number 12
  $meta+SHIFT+KP_Next    move container to workspace number 13
  $meta+SHIFT+KP_Left    move container to workspace number 14
  $meta+SHIFT+KP_Begin   move container to workspace number 15
  $meta+SHIFT+KP_Right   move container to workspace number 16
  $meta+SHIFT+KP_Home    move container to workspace number 17
  $meta+SHIFT+KP_Up      move container to workspace number 18
  $meta+SHIFT+KP_Page_Up move container to workspace number 19
  $meta+SHIFT+KP_Insert  move container to workspace number 20
}

## Window Split
bindsym {
  $meta+SHIFT+B splith
  $meta+SHIFT+V splitv
}

## Resizing
bindsym {
  $meta+EQUAL resize grow   width 10px
  $meta+MINUS resize shrink width 10px

  $meta+SHIFT+EQUAL resize grow   height 10px
  $meta+SHIFT+MINUS resize shrink height 10px
}

bindsym $meta+R mode "resize"

mode "resize" {
  bindsym {
   Left  resize grow   width  10px
   Down  resize shrink height 10px
   Up    resize grow   height 10px
   RIGHT resize shrink width  10px

   $left  resize grow   width  10px
   $down  resize shrink height 10px
   $up    resize grow   height 10px
   $right resize shrink width  10px

   $meta+R mode "default"
   RETURN  mode "default"
   ESCAPE  mode "default"
  }
}

## Decorations
bindsym {
  # $meta+grave bar mode toggle
  $meta+$hyper+B border toggle

  $meta+$hyper+MINUS gaps inner current plus  5
  $meta+$hyper+EQUAL gaps inner current minus 5
}

## Layouts
bindsym {
  $meta+SHIFT+O   layout toggle splith splitv stacking tabbed
  CTRL+$meta+E    layout toggle split
  CTRL+$meta+S    layout stacking
  CTRL+$meta+W    layout tabbed

  $meta+F         fullscreen
  # $meta+A         focus parent
  $meta+P         sticky toggle
  $meta+C         move position center
  $meta+SPACE     floating toggle
  $meta+BACKSPACE focus mode_toggle
  $meta+TAB       workspace back_and_forth
}

## Minimize
bindsym {
  $meta+M       move scratchpad
  $meta+SHIFT+M scratchpad show
}

# Media
## Audio
bindsym --locked {
  XF86AudioPlay exec playerctl play-pause
  XF86AudioNext exec playerctl next
  XF86AudioPrev exec playerctl previous

  XF86AudioMute        exec wpctl set-mute   @DEFAULT_AUDIO_SINK@   toggle && (wpctl get-volume @DEFAULT_AUDIO_SINK@   | grep -q MUTED && echo 0 > $XDG_RUNTIME_DIR/wob.sock || wpctl get-volume @DEFAULT_AUDIO_SINK@   | awk '{print int($2*100)}' > $XDG_RUNTIME_DIR/wob.sock)
  XF86AudioMicMute     exec wpctl set-mute   @DEFAULT_AUDIO_SOURCE@ toggle && (wpctl get-volume @DEFAULT_AUDIO_SOURCE@ | grep -q MUTED && echo 0 > $XDG_RUNTIME_DIR/wob.sock || wpctl get-volume @DEFAULT_AUDIO_SOURCE@ | awk '{print int($2*100)}' > $XDG_RUNTIME_DIR/wob.sock)
  XF86AudioLowerVolume exec wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%- && wpctl get-volume @DEFAULT_AUDIO_SINK@ | awk '{print int($2*100)}' > $XDG_RUNTIME_DIR/wob.sock
  XF86AudioRaiseVolume exec wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+ && wpctl get-volume @DEFAULT_AUDIO_SINK@ | awk '{print int($2*100)}' > $XDG_RUNTIME_DIR/wob.sock
}

## Brightness
bindsym --locked {
  XF86MonBrightnessUp   exec brightnessctl set 5%+ | grep -oP '\(\K[^%\)]+' > $XDG_RUNTIME_DIR/wob.sock
  XF86MonBrightnessDown exec brightnessctl set 5%- | grep -oP '\(\K[^%\)]+' > $XDG_RUNTIME_DIR/wob.sock
}

## Power
bindswitch --locked {
  lid:on exec swaylock -f && systemctl hibernate
  lid:off exec output $screen enable
}

# в–Ҳв–Җв–„в–Җв–Ҳ в–Ҳв–Җв–Ҳ в–Ҳ в–Ҳ в–Ҳв–Җ в–Ҳв–Җв–Җ   в–Ҳв–„в–„ в–Ҳ в–Ҳв–„ в–Ҳ в–Ҳв–Җв–„ в–Ҳ в–Ҳв–„ в–Ҳ в–Ҳв–Җв–ҖвҖғв–Ҳв–Җ
# в–Ҳ в–Җ в–Ҳ в–Ҳв–„в–Ҳ в–Ҳв–„в–Ҳ в–„в–Ҳ в–Ҳв–Ҳв–„   в–Ҳв–„в–Ҳ в–Ҳ в–Ҳ в–Җв–Ҳ в–Ҳв–„в–Җ в–Ҳ в–Ҳ в–Җв–Ҳ в–Ҳв–„в–ҲвҖғв–„в–Ҳ

bindsym --whole-window --border {
  $meta+button4       resize shrink height 5 px or 5 ppt
  $meta+button5       resize grow   height 5 px or 5 ppt
  $meta+SHIFT+button4 resize shrink width  5 px or 5 ppt
  $meta+SHIFT+button5 resize grow   width  5 px or 5 ppt
}

# в–Ҳ в–ҲвҖғв–Ҳв–Җв–„в–Җв–Ҳ
# в–Җв–„в–ҖвҖғв–Ҳ в–Җ в–Ҳ

bindsym CTRL+$meta+ALT+P mode "passthru"

mode "passthru" {
  bindsym CTRL+$meta+ALT+P mode "default"
}