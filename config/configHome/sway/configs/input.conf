input * {
  repeat_delay 200
  repeat_rate 60
}

# Keyboard
input type:keyboard {
  xkb_layout "us"
  xkb_numlock disabled
  xkb_options "caps:hyper"
}

# Touchpad
input type:touchpad {
  dwt enabled
  tap enabled
  natural_scroll enabled
  middle_emulation enabled
  drag_lock disabled
  # scroll_factor 0.2
}

# bindgesture swipe:up exec $launcher

bindgesture swipe:up   focus next
bindgesture swipe:down focus prev

bindgesture swipe:left  workspace prev
bindgesture swipe:right workspace next
