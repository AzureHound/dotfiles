# в–Ҳ в–Ҳ в–ҲвҖғв–ҲвҖғв–Ҳв–„ в–ҲвҖғв–Ҳв–Җв–„вҖғв–Ҳв–Җв–ҲвҖғв–Ҳ в–Ҳ в–ҲвҖғ вҖғв–Ҳв–Җв–ҲвҖғв–Ҳ в–ҲвҖғв–Ҳ  вҖғв–Ҳв–Җв–ҖвҖғв–Ҳв–Җ
# в–Җв–„в–Җв–„в–ҖвҖғв–ҲвҖғв–Ҳ в–Җв–ҲвҖғв–Ҳв–„в–ҖвҖғв–Ҳв–„в–ҲвҖғв–Җв–„в–Җв–„в–ҖвҖғ вҖғв–Ҳв–Җв–„вҖғв–Ҳв–„в–ҲвҖғв–Ҳв–„в–„вҖғв–Ҳв–Ҳв–„вҖғв–„в–Ҳ

# for_window [shell=".*"] focus
# for_window [urgent="latest"] focus
# for_window [floating] border pixel 2, move position center
# for_window [title="^.*"] border pixel 2, title_format "<b> %class >> %title </b>"

# Scratchpads
for_window {
  [app_id="(activity|bluetooth|code-editor|file-manager|file-manager-ALT|gpt|gpu|mail|sounds|text-editor|wifi)"] floating enable, resize set 1250 690, move position center
  [app_id="(emoji|glyph)"] floating enable, resize set 1140 690, move position center
  [app_id="quickterm"] floating enable, resize set 1200 640, move position center
  [app_id="rhythm"] floating enable, resize set 1000 500, move position center
  [app_id="to-do"] floating enable, resize set 600 700, move position center
}

for_window {
  [title="branchdialog"] floating enable
  [title="Kvantum Manager"] floating enable, resize set 1200 700
  [title="nwg-look"] floating enable, resize set 900 540
}

for_window {
  [title=".*(Open File|Save File|Open Folder|Save Folder|Save Image|Save As|Open As|Select Move Destination|Select Extract Destination|Select Image|Add File|Exclude File|File Upload|Add Folders|Include Folder|Exclude Directory|Backup Location|Open videos or images to compare|Open folder as vault|Open database).*"] floating enable
  [title=".*Library.*"] floating enable, resize set 1190 660
}

# Apps
for_window {
  [app_id="org.gnome.Decibels|Impression|pavucontrol|qimgv"] floating enable
  [app_id="org.gnome.Calculator"] floating enable, resize set 660 660
  [app_id="org.gnome.NautilusPreviewer"] floating enable, resize set 1200 700
  [app_id="org.pwmt.zathura"] floating enable, resize set 700 1200
  [app_id="mpv"] floating enable, border pixel 2
  [app_id="firefox"] inhibit_idle fullscreen
  # [app_id="tmux"] fullscreen enable
}

# Window Type
for_window {
  [window_type="dialog"]     floating enable
  [window_type="utility"]    floating enable
  [window_type="popup_menu"] floating enable
}

# Development
for_window {
  [app_id="tmux"] border none
  # [app_id="scrcpy"] floating enable
  # [title="Pixel 4a"] move position 100%-25% 2%-0%
}

# Idle
for_window {
  [app_id=".*"] inhibit_idle fullscreen
  [class=".*"]  inhibit_idle fullscreen
  [app_id="caffeine"] inhibit_idle open, move container to workspace 20
}

# Picture-in-Picture
for_window {
  [title="^(Picture-in-Picture)$" workspace="^([1-9]|10)$"]  floating enable, sticky enable, border pixel 0, resize set 499 281, move position 779 437, no_focus
  [title="^(Picture-in-Picture)$" workspace="^(1[1-9]|20)$"] floating enable, sticky enable, border pixel 0, resize set 499 281, move position 779 437, no_focus
}

# Workspaces
assign {
  [app_id="obsidian"] workspace 8
}

# XWayland
for_window [shell="xwayland"] title_format "<span>[X] %titleгӮң</span>"