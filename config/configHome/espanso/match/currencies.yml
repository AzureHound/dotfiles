# Currency Symbols
# individual currencies—themnemonic is to use the letter with a hyphen to combine them into the symbol

name: currencies
parent: default

matches:
  - triggers: [":c|", ":cent", ":C|", ":|c", ":|C"]
    replace: "¢"
  - triggers: [":d-", ":-d", ":D-", ":-D", ":dong"]
    replace: "₫"
  - triggers: [":e-", ":-e", ":E-", ":-E", ":euro"]
    replace: "€"
  - triggers: [":-l", ":l-", ":pound"]
    replace: "£"
  - triggers: [":-L", ":L-", ":Pound", ":POUND"]
    replace: "￡"
  - triggers: [":r-", ":-r", ":rupee"]
    replace: "₹"
  - triggers: [":w-", ":-w", ":won"]
    replace: "₩"
  - triggers: [":W-", ":-W", ":WON"]
    replace: "￦"
  - triggers: [":y-", ":yen", ":-y"]
    replace: "¥"
  - triggers: [":Yen", ":YEN", ":Y-", ":-Y"]
    replace: "￥"
  # type :$: to bring up a menu for these
  - trigger: ":$:"
    label: "AFGHANI"
    replace: "؋"
